name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      FRAUDGUARD_STORE: snapshot        # tests use the committed snapshot store
      WANDB_MODE: offline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (errors + undefined names)
        run: |
          pip install ruff
          ruff check --select E9,F63,F7,F82 src tests scripts

      - name: Run full test suite
        # All tests run against committed fixtures/small artifacts. Tests that need
        # the full Kaggle dataset self-skip — CI never requires Kaggle credentials.
        run: pytest -q
