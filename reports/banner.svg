<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="FraudGuard - fraud detection on the IEEE-CIS dataset">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a111f"/>
      <stop offset="1" stop-color="#0e2032"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#134e6f" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#134e6f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <!-- soft depth glow behind the emblem -->
  <circle cx="150" cy="150" r="190" fill="url(#glow)"/>
  <!-- thin accent frame at the very bottom edge, clear of all content -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#accent)" opacity="0.9"/>

  <!-- shield emblem -->
  <g transform="translate(84,86)">
    <path d="M56 0 L112 22 V72 C112 110 88 140 56 154 C24 140 0 110 0 72 V22 Z"
          fill="url(#shield)"/>
    <path d="M34 76 L50 93 L82 53" fill="none" stroke="#ffffff" stroke-width="10"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="248" y="126" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="66" font-weight="700" fill="#f8fafc" letter-spacing="-0.5">
    Fraud<tspan fill="url(#accent)">Guard</tspan>
  </text>
  <!-- short accent rule under the wordmark -->
  <rect x="250" y="142" width="150" height="4" rx="2" fill="url(#accent)"/>

  <!-- subtitle -->
  <text x="250" y="182" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="400" fill="#93a4bd">
    Fraud detection on the IEEE-CIS dataset — engineered end to end
  </text>

  <!-- stat pills: uniform styling, evenly spaced, clear of all text -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
     font-size="19" font-weight="600" fill="#d7e2f2">
    <g transform="translate(250,210)">
      <rect width="228" height="46" rx="23" fill="#10263c" stroke="#2dd4bf" stroke-opacity="0.35"/>
      <text x="114" y="30" text-anchor="middle">590,540 transactions</text>
    </g>
    <g transform="translate(494,210)">
      <rect width="150" height="46" rx="23" fill="#10263c" stroke="#2dd4bf" stroke-opacity="0.35"/>
      <text x="75" y="30" text-anchor="middle">3.5% fraud</text>
    </g>
    <g transform="translate(660,210)">
      <rect width="210" height="46" rx="23" fill="#10263c" stroke="#2dd4bf" stroke-opacity="0.35"/>
      <text x="105" y="30" text-anchor="middle">leak-free split</text>
    </g>
    <g transform="translate(886,210)">
      <rect width="266" height="46" rx="23" fill="#10263c" stroke="#2dd4bf" stroke-opacity="0.35"/>
      <text x="133" y="30" text-anchor="middle">point-in-time features</text>
    </g>
  </g>
</svg>
