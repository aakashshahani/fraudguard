<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="FraudGuard - fraud detection on the IEEE-CIS dataset">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#111f3a"/>
      <stop offset="1" stop-color="#0c2233"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3a6"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3a6"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g stroke="#1e2f4d" stroke-width="1" opacity="0.5">
    <path d="M0 75 H1200 M0 150 H1200 M0 225 H1200"/>
    <path d="M150 0 V300 M300 0 V300 M450 0 V300 M600 0 V300 M750 0 V300 M900 0 V300 M1050 0 V300"/>
  </g>

  <!-- transaction-stream pulse line -->
  <polyline fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.85" filter="url(#soft)"
    points="70,235 130,235 155,235 175,200 200,235 260,235 300,235 320,160 345,235 430,235 470,235
            495,120 520,235 640,235 700,235 725,205 750,235 830,235 900,235 925,175 950,235 1130,235"/>
  <!-- flagged fraud spike marker -->
  <circle cx="495" cy="120" r="7" fill="#f43f5e"/>
  <circle cx="495" cy="120" r="14" fill="none" stroke="#f43f5e" stroke-width="2" opacity="0.6"/>

  <!-- shield emblem -->
  <g transform="translate(90,70)">
    <path d="M55 0 L110 22 V70 C110 108 86 138 55 152 C24 138 0 108 0 70 V22 Z"
          fill="url(#shield)" opacity="0.95"/>
    <path d="M55 12 L98 29 V70 C98 100 79 125 55 137 C31 125 12 100 12 70 V29 Z"
          fill="#0b1220" opacity="0.35"/>
    <path d="M34 74 L49 90 L80 52" fill="none" stroke="#ffffff" stroke-width="9"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="250" y="118" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#f8fafc">
    Fraud<tspan fill="url(#accent)">Guard</tspan>
  </text>
  <text x="252" y="162" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#94a3b8">
    Fraud detection on the IEEE-CIS dataset — engineered end to end
  </text>

  <!-- stat chips -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="600">
    <g transform="translate(252,200)">
      <rect width="196" height="46" rx="23" fill="#0f2036" stroke="#22d3a6" stroke-opacity="0.4"/>
      <text x="24" y="30" fill="#e2e8f0">590,540 transactions</text>
    </g>
    <g transform="translate(464,200)">
      <rect width="168" height="46" rx="23" fill="#0f2036" stroke="#38bdf8" stroke-opacity="0.4"/>
      <text x="24" y="30" fill="#e2e8f0">434 features</text>
    </g>
    <g transform="translate(648,200)">
      <rect width="150" height="46" rx="23" fill="#0f2036" stroke="#f43f5e" stroke-opacity="0.45"/>
      <text x="22" y="30" fill="#e2e8f0">3.5% fraud</text>
    </g>
    <g transform="translate(814,200)">
      <rect width="236" height="46" rx="23" fill="#0f2036" stroke="#22d3a6" stroke-opacity="0.4"/>
      <text x="22" y="30" fill="#e2e8f0">chronological split</text>
    </g>
  </g>
</svg>
